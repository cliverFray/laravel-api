version: '3.8'

services:
  app:
    image: bitnami/laravel:11
    ports:
      - '8000:8000'
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=host.docker.internal
      - DB_PORT=3306
      - DB_DATABASE=store
      - DB_USERNAME=root
      - DB_PASSWORD=
    volumes:
      - '.:/app'
    extra_hosts:
      - "host.docker.internal:host-gateway"
